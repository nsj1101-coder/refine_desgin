<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Principle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    body { font-family: 'Pretendard', sans-serif; margin: 0; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body>

<!-- Core Principle Section -->
<div class="w-full bg-[#201814] relative flex justify-between overflow-hidden" style="min-height:358px">

  <!-- Left: Title Area -->
  <div class="flex flex-col gap-0 pt-10 pl-[50px] shrink-0">
    <span class="font-montserrat text-[#B8A99A] text-base font-medium leading-[1.5]">Core Principle</span>
    <h2 class="text-[#FBF6F1] text-[44px] font-bold leading-[1.3] tracking-[-1px] mt-[6px]">리프팅 핵심 원리</h2>
    <div class="w-[46px] h-px bg-[#FBF6F1] opacity-50 mt-[14px]"></div>
  </div>

  <!-- Vertical Divider (right of title area) -->
  <div class="absolute w-px h-[46px] bg-[#FBF6F1] opacity-50" style="left:774px;top:95px;"></div>

  <!-- Right: Description -->
  <div class="flex flex-col gap-5 pt-[86px] pr-[50px]" style="max-width:740px">
    <p class="text-white text-[17px] font-light leading-[1.6] max-w-[732px]">리프팅 시술은 피부 속 콜라겐과 엘라스틴의 재생을 촉진하여 무너진 페이스 라인을 복원하고, 자연스러운 탄력을 되찾아주는 비침습적 안티에이징 솔루션입니다.</p>
    <p class="text-white text-[17px] font-light leading-[1.6] max-w-[727px]">고주파, 초음파, 마이크로 니들 RF 등 다양한 에너지를 활용해 진피층부터 SMAS 근막층까지 깊이별 맞춤 시술이 가능하며, 절개 없이도 수술에 준하는 리프팅 효과를 기대할 수 있습니다.</p>
    <p class="text-[#FBF6F1] text-lg font-medium leading-[1.6] max-w-[517px]">REFINE은 개인마다 다른 피부 노화 패턴과 골격 구조를 고려하여 최적의 리프팅 프로토콜을 설계해 드립니다.</p>
  </div>

</div>

</body>
</html>
