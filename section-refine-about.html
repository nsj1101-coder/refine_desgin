<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section - About (Refine Philosophy)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --color-about-bg: #201814C7;
      --color-subtitle: #888888;
      --color-white: #FFFFFF;
      --color-accent-beige: #F2E7DA;
    }
  </style>
</head>
<body>

<!-- Section - About (Refine Philosophy) -->
<div class="w-full flex flex-col items-center justify-center gap-12 px-[120px] py-[80px]" style="background-color:#201814C7;min-height:490px">

  <!-- Title Group -->
  <div class="flex flex-col items-center gap-[30px] w-full" style="max-height:290px">

    <!-- Subtitle -->
    <span class="text-[var(--color-subtitle)] text-base font-semibold tracking-[4px] text-center" style="font-family:'Montserrat',sans-serif">[ REFINE PHILOSOPHY ]</span>

    <!-- Title Inner -->
    <div class="flex flex-col items-center w-full">
      <!-- Line 1 -->
      <h2 class="text-[var(--color-white)] text-[60px] font-bold leading-[1.5] text-center max-w-[840px]" style="font-family:'Pretendard',sans-serif">시간이 흘러도 변치 않는 가치,</h2>
      <!-- Line 2 -->
      <div class="flex items-center justify-center w-full">
        <span class="text-[var(--color-white)] text-[60px] font-bold leading-[1.5]" style="font-family:'Pretendard',sans-serif">본연의 아름다움을 </span>
        <span class="text-[var(--color-accent-beige)] text-[60px] font-bold leading-[1.5]" style="font-family:'Montserrat',sans-serif">Refine</span>
        <span class="text-[var(--color-white)] text-[60px] font-bold leading-[1.5]" style="font-family:'Pretendard',sans-serif"> 하다.</span>
      </div>
    </div>

  </div>

</div>

</body>
</html>
